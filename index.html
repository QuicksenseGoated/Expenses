<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Financer" />
  <meta name="application-name" content="Financer" />
  <meta name="description" content="Financer — premium personal finance for balance, bills, and spending." />
  <title>Financer</title>
  <link rel="manifest" href="./manifest.webmanifest?v=11" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png?v=5" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=5" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=12" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js?v=12"></script>
  <script>
    (function () {
      var v = '12';
      if (!('serviceWorker' in navigator)) return;

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js?v=' + v).then(function (reg) {
          reg.update();
          if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
        }).catch(function () {});

        // Purge legacy Sense Desk / Ledger caches if any remain
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              if (/sense|ledger|qs-ops|financer-v([1-9]|10)/i.test(k)) caches.delete(k);
            });
          });
        }
      });
    })();
  </script>
</body>
</html>
